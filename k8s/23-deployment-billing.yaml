apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing
  namespace: healthcare
  labels:
    app: billing
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: billing
  template:
    metadata:
      labels:
        app: billing
      annotations:
        seccomp.security.alpha.kubernetes.io/pod: runtime/default
    spec:
      serviceAccountName: healthcare-auth
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10003
        runAsGroup: 10003
        fsGroup: 10003
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: billing
          image: healthcare-micro-clean/billing:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: jwt-secret
            - name: JWT_ISSUER
              value: healthcare-micro-clean
            - name: JWT_AUDIENCE
              value: healthcare-internal
            - name: AUTH_SERVICE_URL
              value: http://auth:8000
            - name: SERVICE_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: service-token
            - name: PAYMENT_GATEWAY_KEY
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: payment-gateway-key
            - name: DB_HOST
              value: billing-db
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: billing
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: healthcare-db-billing
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: healthcare-db-billing
                  key: password
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10003
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: billing
  namespace: healthcare
  labels:
    app: billing
spec:
  type: ClusterIP
  selector:
    app: billing
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
