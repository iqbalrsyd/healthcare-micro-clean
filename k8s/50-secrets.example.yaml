# Example secret manifests. Replace base64-encoded values with those from your
# secret manager (e.g. Sealed Secrets, External Secrets Operator, Vault Agent).
# `kubectl apply` will fail on these placeholders — that is intentional.
apiVersion: v1
kind: Secret
metadata:
  name: healthcare-secrets
  namespace: healthcare
type: Opaque
stringData:
  jwt-secret: "REPLACE_WITH_OUTPUT_OF_openssl_rand_base64_48"
  service-token: "REPLACE_WITH_OUTPUT_OF_openssl_rand_base64_32"
  payment-gateway-key: "REPLACE_WITH_PAYMENT_GATEWAY_KEY"
---
apiVersion: v1
kind: Secret
metadata:
  name: healthcare-db-auth
  namespace: healthcare
type: Opaque
stringData:
  username: "auth_app"
  password: "REPLACE_WITH_DB_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: healthcare-db-patient
  namespace: healthcare
type: Opaque
stringData:
  username: "patient_app"
  password: "REPLACE_WITH_DB_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: healthcare-db-appointment
  namespace: healthcare
type: Opaque
stringData:
  username: "appointment_app"
  password: "REPLACE_WITH_DB_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: healthcare-db-billing
  namespace: healthcare
type: Opaque
stringData:
  username: "billing_app"
  password: "REPLACE_WITH_DB_PASSWORD"
